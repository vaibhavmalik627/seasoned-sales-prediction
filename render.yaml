services:
  - type: web
    name: retail-demand-ml-service
    env: python
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11

  - type: web
    name: retail-demand-backend
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: retail-demand-ml-service
          property: hostport
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: retail-demand-frontend
          property: host

  - type: web
    name: retail-demand-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: retail-demand-backend
          property: host
